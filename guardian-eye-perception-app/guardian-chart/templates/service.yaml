apiVersion: v1
kind: Service
metadata:
  name: perception-service
spec:
  selector:
    app: perception # This MUST match the 'app: perception' label in your deployment.yaml
  ports:
    - protocol: TCP
      port: 80         # The port the Service listens on
      targetPort: 8000 # The port the FastAPI app is actually running on
  type: NodePort       # This makes the service accessible within the cluster/VPC